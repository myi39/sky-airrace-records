<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/submit.css" />
    <script src="https://www.google.com/recaptcha/api.js?render=6LcW8M8sAAAAADc9zZzAc2Uh9LoreX2HQL5T5QDq"></script>
  </head>
  <body>
    <button class="hamburger-btn">
      <div class="hamburger-line"></div>
      <div class="hamburger-line"></div>
      <div class="hamburger-line"></div>
    </button>

    <div class="container">
      <div class="about-section">
        <h3 class="about-heading">記録の申請</h3>

        <div class="form-group">
          <label>大会種別 <span class="required">*</span></label>
          <p class="desc">コースの大会種別を選んでください</p>
          <div class="select-wrapper">
            <select id="category">
              <option value="">選択してください</option>
            </select>
          </div>
          <span class="field-error" id="error-category"></span>
        </div>

        <div class="form-group">
          <label>コース名 <span class="required">*</span></label>
          <p class="desc">コースを選んでください</p>
          <div class="select-wrapper">
            <select id="course" disabled>
              <option value="">大会種別を先に選んでください</option>
            </select>
          </div>
          <span class="field-error" id="error-course"></span>
        </div>

        <div class="form-group">
          <label>ユーザー名 <span class="required">*</span></label>
          <p class="desc">X アカウント名を入力してください</p>
          <input
            id="username"
            class="underline-input underline-full"
            type="text"
            placeholder="@username"
          />
          <span class="field-error" id="error-username"></span>
        </div>

        <div class="form-group">
          <label>タイム <span class="required">*</span></label>
          <p class="desc">記録タイムを秒単位で入力してください</p>
          <input
            id="time"
            class="underline-input underline-time"
            type="text"
            placeholder="31.31"
          />
          <span class="field-error" id="error-time"></span>
        </div>

        <div class="form-group">
          <label>記録日 <span class="required">*</span></label>
          <p class="desc">記録を達成した日付を選んでください</p>
          <input
            id="record-date"
            class="underline-input underline-date"
            type="date"
          />
          <span class="field-error" id="error-record-date"></span>
        </div>

        <div class="form-group">
          <label>リンク <span class="required">*</span></label>
          <p class="desc">
            動画のリンクを貼り付けてください（YouTube または X）
          </p>
          <input
            id="link"
            class="underline-input underline-full"
            type="url"
            placeholder="https://"
          />
          <span class="field-error" id="error-link"></span>
        </div>

        <div class="form-group">
          <label>操作方法 <span class="required">*</span></label>
          <p class="desc">操作方法を選んでください</p>
          <div class="select-wrapper">
            <select id="control">
              <option value="">選択してください</option>
              <option>タッチ</option>
              <option>タッチ（箒あり）</option>
              <option>コントローラー</option>
              <option>コントローラー（箒あり）</option>
            </select>
          </div>
          <span class="field-error" id="error-control"></span>
        </div>

        <div class="form-group">
          <label>補足事項 <span class="optional">（任意）</span></label>
          <p class="desc">特筆すべき点があれば入力してください</p>
          <textarea
            id="notes"
            class="underline-input underline-full"
          ></textarea>
        </div>

        <button id="submit-btn" class="submit-btn">記録を申請する</button>
        <p class="recaptcha-note">reCAPTCHA v3 により保護されています</p>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-card">
        <h3 class="modal-title">この内容で申請しますか？</h3>
        <dl class="confirm-list" id="confirm-list"></dl>
        <div class="modal-actions">
          <button id="modal-back-btn" class="modal-btn modal-btn-secondary">戻る</button>
          <button id="modal-submit-btn" class="modal-btn modal-btn-primary">送信する</button>
        </div>
      </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal-overlay">
      <div class="modal-card modal-card-result">
        <div id="result-icon" class="result-icon"></div>
        <p id="result-message" class="result-message"></p>
        <button id="result-close-btn" class="modal-btn modal-btn-primary">閉じる</button>
      </div>
    </div>

    <script src="js/submit.js"></script>
  </body>
</html>
